version: '3'

env:
  FRONTEND_PORT: '{{.FRONTEND_PORT | default "5173"}}'
  BACKEND_PORT: '{{.BACKEND_PORT | default "8000"}}'

tasks:
  install:
    desc: frontendとinfraの依存関係をinstallする。
    cmds:
      - npm install

  install:backend:
    desc: uvでbackendの依存関係をinstallする。
    cmds:
      - cd backend && uv sync

  verify:
    desc: ローカルの静的検証、test、build、正規契約検査を実行する。
    cmds:
      - npm run typecheck --workspaces --if-present
      - npm test --workspaces --if-present
      - npm run build --workspaces --if-present
      - cd backend && UV_CACHE_DIR={{.UV_CACHE_DIR | default "/tmp/diopside-uv-cache"}} uv run --locked ruff check src tests
      - cd backend && UV_CACHE_DIR={{.UV_CACHE_DIR | default "/tmp/diopside-uv-cache"}} uv run --locked ruff format --check src tests
      - cd backend && UV_CACHE_DIR={{.UV_CACHE_DIR | default "/tmp/diopside-uv-cache"}} uv run --locked pyright
      - cd backend && UV_CACHE_DIR={{.UV_CACHE_DIR | default "/tmp/diopside-uv-cache"}} uv run --locked mypy src tests
      - cd backend && UV_CACHE_DIR={{.UV_CACHE_DIR | default "/tmp/diopside-uv-cache"}} uv run --locked app-archlint
      - cd backend && UV_CACHE_DIR={{.UV_CACHE_DIR | default "/tmp/diopside-uv-cache"}} uv run --locked app-docs generate --check
      - cd backend && UV_CACHE_DIR={{.UV_CACHE_DIR | default "/tmp/diopside-uv-cache"}} uv run --locked pytest
      - cd backend && UV_CACHE_DIR={{.UV_CACHE_DIR | default "/tmp/diopside-uv-cache"}} uv run --locked python -m app.scripts.verify_contract
      - task: cost:verify
      - task: quota:verify
      - npm run plan -w infra
      - npm run synth -w @diopside/infra
      - npm run test:e2e -w frontend

  dev:backend:
    desc: 公開契約hostのFastAPI backendを起動する。
    env:
      DIO_CONTRACT_DIR: 'backend/data/public'
      UVICORN_PORT: '{{.BACKEND_PORT}}'
    cmds:
      - cd backend && uv run --locked uvicorn app.main:app --app-dir src --reload --host 0.0.0.0 --port {{.BACKEND_PORT}}

  dev:frontend:
    desc: frontendのローカル開発serverを起動する。
    cmds:
      - npm run dev -w frontend -- --host 0.0.0.0 --port {{.FRONTEND_PORT}}

  dev:all:
    desc: 利用前にbackendとfrontendをローカルterminalで起動する。
    cmds:
      - task -s dev:backend
      - task -s dev:frontend

  export:check:
    desc: 静的release契約の形式を検証する。
    cmds:
      - cd backend && UV_CACHE_DIR={{.UV_CACHE_DIR | default "/tmp/diopside-uv-cache"}} uv run --locked python -m app.scripts.verify_contract

  docs:generate:
    desc: API索引、OpenAPI、全操作別設計文書を生成する。
    cmds:
      - cd backend && UV_CACHE_DIR={{.UV_CACHE_DIR | default "/tmp/diopside-uv-cache"}} uv run --locked app-docs generate

  docs:check:
    desc: ファイルを書き込まず、全生成APIドキュメントを検査する。
    cmds:
      - cd backend && UV_CACHE_DIR={{.UV_CACHE_DIR | default "/tmp/diopside-uv-cache"}} uv run --locked app-docs generate --check

  tags:migrate:preview:
    desc: 受領v2タグを決定的な正規v3 preview fileへ移行する。
    cmds:
      - >-
        cd backend && UV_CACHE_DIR={{.UV_CACHE_DIR | default "/tmp/diopside-uv-cache"}}
        uv run --locked python -m app.scripts.migrate_tags
        --tags-zip ../.workspace/tags.zip
        --output /tmp/diopside-tags-v3.json
        --public-index /tmp/diopside-tag-index-v3.json
        --release-id migration-preview

  tags:release:verify:
    desc: 受領snapshot全体から通常release候補を構築・検証する。
    cmds:
      - >-
        rm -rf /tmp/diopside-received-release &&
        cd backend && UV_CACHE_DIR={{.UV_CACHE_DIR | default "/tmp/diopside-uv-cache"}}
        uv run --locked python -m app.scripts.build_received_release
        --tags-zip ../.workspace/tags.zip
        --corrections data/tag-corrections-v3.json
        --usage-decisions data/usage-decisions-v1.json
        --release-id received-preview-v3
        --output /tmp/diopside-received-release
        --report /tmp/diopside-received-release-report.json

  tags:semantics:verify:
    desc: 発話、collaborator、group投影の受理・拒否結果を検証する。
    cmds:
      - >-
        cd backend && UV_CACHE_DIR={{.UV_CACHE_DIR | default "/tmp/diopside-uv-cache"}}
        uv run --locked python -m app.scripts.verify_received_semantics
        --tags-zip ../.workspace/tags.zip
        --report /tmp/diopside-semantic-verification.json

  cost:verify:
    desc: 現在の月次AWS cost証拠の計算と目標を検証する。
    cmds:
      - python3 tools/verify_cost_estimate.py

  quota:verify:
    desc: YouTube method cost、標準負荷、peak抑制、予約を検証する。
    cmds:
      - python3 tools/verify_youtube_quota.py

  cdk:test:
    desc: AWSへ接続せずCDK assertion testをbuild・実行する。
    cmds:
      - npm test -w @diopside/infra

  cdk:synth:
    desc: deployせずローカルでsynthとcdk-nagを実行する。
    cmds:
      - npm run synth -w @diopside/infra

  test:e2e:
    desc: desktop・mobile Chromeのroute・keyboard受け入れtestをローカル実行する。
    cmds:
      - npm run test:e2e -w frontend
